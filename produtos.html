<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Meu Projeto Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center text-primary">Produtos</h1><br><br>
        <div class="row justify-content-center">
            <div class="col-sm-3">
                <div class="card">
                    <img src="https://picsum.photos/200/200" class="card-img-top" alt="Produto 1" style="height: 150px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Produto 1</h5>
                        <p class="card-text">Descrição do produto 1.</p>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input item-produto" type="checkbox" value="50.00" id="produto1">
                                <label class="form-check-label" for="produto1">
                                    Selecionar produto
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="qtd1" class="form-label">Quantidade:</label>
                            <input type="number" class="form-control qtd-produto" id="qtd1" value="1" min="1">
                        </div>
                        <a href="#" class="btn btn-primary btn-adicionar">Adicionar ao Carrinho</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="card">
                    <img src="https://picsum.photos/200/200" class="card-img-top" alt="Produto 2" style="height: 150px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Produto 2</h5>
                        <p class="card-text">Descrição do produto 2.</p>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input item-produto" type="checkbox" value="75.00" id="produto2">
                                <label class="form-check-label" for="produto2">
                                    Selecionar produto
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="qtd2" class="form-label">Quantidade:</label>
                            <input type="number" class="form-control qtd-produto" id="qtd2" value="1" min="1">
                        </div>
                        <a href="#" class="btn btn-primary btn-adicionar">Adicionar ao Carrinho</a>
                    </div>
                </div>
            </div>
            <div class="col-sm-3">
                <div class="card">
                    <img src="https://picsum.photos/200/200" class="card-img-top" alt="Produto 3" style="height: 150px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">Produto 3</h5>
                        <p class="card-text">Descrição do produto 3.</p>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input item-produto" type="checkbox" value="100.00" id="produto3">
                                <label class="form-check-label" for="produto3">
                                    Selecionar produto
                                </label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="qtd3" class="form-label">Quantidade:</label>
                            <input type="number" class="form-control qtd-produto" id="qtd3" value="1" min="1">
                        </div>
                        <a href="#" class="btn btn-primary btn-adicionar">Adicionar ao Carrinho</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-info text-center mt-5">
        <h3>Valor Total: R$ <span id="valor-total">0,00</span></h3>
        <a href="compra.html" class="btn btn-primary mt-3">Concluir Compra</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
