<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornari — Depoimentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Meu Projeto Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="depoimentos.html">Depoimentos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 text-center">
        <h2 class="text-primary mb-4">O que nossos clientes dizem</h2>
        <div class="row" id="lista-depoimentos">
            <!-- Preenchido dinamicamente via fetch() -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script direto (sem módulo) para funcionar com file:// -->
    <script>
        async function carregarDepoimentos() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/comments?_limit=3");
                const dados = await response.json();
                const lista = document.getElementById("lista-depoimentos");

                lista.innerHTML = dados.map(item => `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body text-start">
                                <h5 class="card-title text-primary">${item.name}</h5>
                                <p class="card-text text-muted">${item.body}</p>
                                <small class="text-secondary"><em>Por: ${item.email}</em></small>
                            </div>
                        </div>
                    </div>
                `).join("");
            } catch (erro) {
                console.error("Erro ao carregar depoimentos:", erro);
                document.getElementById("lista-depoimentos").innerHTML =
                    '<div class="col-12"><p class="text-danger">Não foi possível carregar os depoimentos.</p></div>';
            }
        }

        carregarDepoimentos();
    </script>
</body>
</html>
