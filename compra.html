<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornari - Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Meu Projeto Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                    <li class="nav-item"><a class="nav-link" href="depoimentos.html">Depoimentos</a></li>
                </ul>
                <button class="btn btn-outline-light ms-3" id="btn-tema">Mudar Tema</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center text-primary">Finalizar Compra</h1>

        <div id="alert-compra" class="mt-3"></div>

        <div class="row justify-content-center g-4 mt-2">
            <div class="col-md-7">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Produtos no Carrinho</h5>
                        <div id="carrinhoLista"></div>
                        <hr>
                        <h5>Total: <span id="totalCarrinho">R$ 0,00</span></h5>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Método de Pagamento</h5>
                        <form id="formPagamento">
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="pagamento" id="credito" value="Cartão de Crédito" checked>
                                <label class="form-check-label" for="credito">Cartão de Crédito</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="pagamento" id="debito" value="Cartão de Débito">
                                <label class="form-check-label" for="debito">Cartão de Débito</label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="pagamento" id="boleto" value="Boleto Bancário">
                                <label class="form-check-label" for="boleto">Boleto Bancário</label>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Finalizar Compra</button>
                            <button type="button" class="btn btn-danger w-100 mt-2" id="btnLimpar">Limpar Carrinho</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var temaSalvo = localStorage.getItem("tema");
        if (temaSalvo) {
            document.documentElement.setAttribute("data-bs-theme", temaSalvo);
        }

        document.getElementById("btn-tema").addEventListener("click", function() {
            var temaAtual = document.documentElement.getAttribute("data-bs-theme");
            var novoTema = temaAtual === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-bs-theme", novoTema);
            localStorage.setItem("tema", novoTema);
        });

        function carregarCarrinho() {
            var carrinho = JSON.parse(localStorage.getItem("carrinho") || "[]");
            var lista = document.getElementById("carrinhoLista");
            var totalEl = document.getElementById("totalCarrinho");

            if (carrinho.length === 0) {
                lista.innerHTML = "<p class='text-muted'>Carrinho vazio.</p>";
                totalEl.textContent = "R$ 0,00";
                return;
            }

            var html = "<ul class='list-group'>";
            var total = 0;
            for (var i = 0; i < carrinho.length; i++) {
                var p = carrinho[i];
                var subtotal = p.preco * p.quantidade;
                total += subtotal;
                html += "<li class='list-group-item d-flex justify-content-between'>";
                html += "<span>" + p.nome + " x" + p.quantidade + "</span>";
                html += "<span>R$ " + subtotal.toFixed(2) + "</span>";
                html += "<button class='btn btn-sm btn-danger' onclick='remover(" + i + ")'>X</button>";
                html += "</li>";
            }
            html += "</ul>";
            lista.innerHTML = html;
            totalEl.textContent = "R$ " + total.toFixed(2);
        }

        function remover(index) {
            var carrinho = JSON.parse(localStorage.getItem("carrinho") || "[]");
            carrinho.splice(index, 1);
            localStorage.setItem("carrinho", JSON.stringify(carrinho));
            carregarCarrinho();
        }

        document.getElementById("btnLimpar").addEventListener("click", function() {
            localStorage.removeItem("carrinho");
            carregarCarrinho();
        });

        document.getElementById("formPagamento").addEventListener("submit", function(e) {
            e.preventDefault();
            var carrinho = JSON.parse(localStorage.getItem("carrinho") || "[]");
            if (carrinho.length === 0) {
                document.getElementById("alert-compra").innerHTML = "<div class='alert alert-warning'>Carrinho vazio!</div>";
                return;
            }
            var metodo = document.querySelector("input[name='pagamento']:checked").value;
            document.getElementById("alert-compra").innerHTML = "<div class='alert alert-success'>Compra finalizada! Pagamento via " + metodo + ".</div>";
            localStorage.removeItem("carrinho");
            carregarCarrinho();
        });

        carregarCarrinho();
    </script>
</body>
</html>
