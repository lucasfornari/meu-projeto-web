<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornari — Finalizar Compra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Meu Projeto Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                    <li class="nav-item"><a class="nav-link" href="depoimentos.html">Depoimentos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">

        <h1 class="text-center text-primary mb-4">Finalizar Compra</h1>

        <div id="alert-compra"></div>

        <div class="row justify-content-center g-4">

            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">🛒 Produtos no Carrinho</h5>
                        <div id="carrinhoLista">
                            <p class="text-muted">Carregando produtos...</p>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Total:</h5>
                            <h4 class="mb-0 text-success fw-bold" id="totalCarrinho">R$ 0,00</h4>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary mb-3">💳 Método de Pagamento</h5>
                        <form id="formPagamento">
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="pagamento" id="credito" value="Cartão de Crédito" checked>
                                <label class="form-check-label" for="credito">Cartão de Crédito</label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="pagamento" id="debito" value="Cartão de Débito">
                                <label class="form-check-label" for="debito">Cartão de Débito</label>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="radio" name="pagamento" id="boleto" value="Boleto Bancário">
                                <label class="form-check-label" for="boleto">Boleto Bancário</label>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg">✅ Finalizar Compra</button>
                                <button type="button" class="btn btn-outline-danger" id="btnLimpar">🗑️ Limpar Carrinho</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalConfirmacao" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-primary" id="modalLabel">Confirmar Ação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <p id="modalMensagem" class="text-muted">Deseja continuar?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmar">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function mostrarAlerta(mensagem, tipo) {
            const container = document.getElementById("alert-compra");
            container.innerHTML = `
                <div class="alert alert-${tipo} alert-dismissible fade show" role="alert">
                    ${mensagem}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
                </div>`;
            setTimeout(() => container.innerHTML = "", 6000);
        }

        function calcularTotal(carrinho) {
            return carrinho.reduce((acc, p) => acc + (Number(p.preco) * Number(p.quantidade)), 0);
        }

        function carregarCarrinho() {
            const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            const lista    = document.getElementById("carrinhoLista");
            const totalEl  = document.getElementById("totalCarrinho");

            if (carrinho.length === 0) {
                lista.innerHTML = '<p class="text-muted">Seu carrinho está vazio.</p>';
                totalEl.textContent = "R$ 0,00";
                return;
            }

            lista.innerHTML = '<div class="list-group">' +
                carrinho.map((produto, index) => `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">${produto.nome || "Produto"}</h6>
                                <small class="text-muted">
                                    ${Number(produto.preco).toLocaleString("pt-BR", { style: "currency", currency: "BRL" })}
                                    × ${produto.quantidade}
                                </small>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-danger"
                                onclick="confirmarRemocao(${index})">Remover</button>
                        </div>
                    </div>
                `).join("") +
            '</div>';

            totalEl.textContent = calcularTotal(carrinho)
                .toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        }

        function confirmarRemocao(index) {
            const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            const nome = carrinho[index].nome || "Produto";
            const modal = new bootstrap.Modal(document.getElementById("modalConfirmacao"));

            document.getElementById("modalLabel").textContent = "Remover Produto";
            document.getElementById("modalMensagem").textContent = `Deseja remover "${nome}" do carrinho?`;
            document.getElementById("btnConfirmar").onclick = function () {
                carrinho.splice(index, 1);
                localStorage.setItem("carrinho", JSON.stringify(carrinho));
                mostrarAlerta(`Produto <strong>${nome}</strong> removido.`, "warning");
                carregarCarrinho();
                modal.hide();
            };
            modal.show();
        }

        document.getElementById("btnLimpar").addEventListener("click", function () {
            const modal = new bootstrap.Modal(document.getElementById("modalConfirmacao"));
            document.getElementById("modalLabel").textContent = "Limpar Carrinho";
            document.getElementById("modalMensagem").textContent = "Deseja remover todos os produtos do carrinho?";
            document.getElementById("btnConfirmar").onclick = function () {
                localStorage.removeItem("carrinho");
                mostrarAlerta("Carrinho limpo com sucesso!", "info");
                carregarCarrinho();
                modal.hide();
            };
            modal.show();
        });

        document.getElementById("formPagamento").addEventListener("submit", function (e) {
            e.preventDefault();
            const metodo = document.querySelector('input[name="pagamento"]:checked').value;
            const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            if (carrinho.length === 0) {
                mostrarAlerta("Seu carrinho está vazio!", "warning");
                return;
            }
            mostrarAlerta(`Compra finalizada com sucesso! Pagamento via <strong>${metodo}</strong>.`, "success");
            localStorage.removeItem("carrinho");
            setTimeout(carregarCarrinho, 500);
        });

        carregarCarrinho();
    </script>

</body>
</html>
