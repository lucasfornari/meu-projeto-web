<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Meu Projeto Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="produtos.html">Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contato.html">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h3 class="mb-0">Conclusão de Compra</h3>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title mb-4">Produtos no Carrinho</h5>
                        <div id="carrinhoLista" class="mb-4">
                            <p class="text-muted">Carregando produtos...</p>
                        </div>

                        <hr>

                        <h5 class="card-title mb-3">Método de Pagamento</h5>
                        <form id="formPagamento">
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="pagamento" id="credito" value="credito" checked>
                                <label class="form-check-label" for="credito">
                                    Cartão de Crédito
                                </label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="radio" name="pagamento" id="debito" value="debito">
                                <label class="form-check-label" for="debito">
                                    Cartão de Débito
                                </label>
                            </div>
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="radio" name="pagamento" id="boleto" value="boleto">
                                <label class="form-check-label" for="boleto">
                                    Boleto Bancário
                                </label>
                            </div>

                            <div class="d-grid gap-2 d-sm-flex">
                                <button type="submit" class="btn btn-success btn-lg">Finalizar Compra</button>
                                <button type="button" class="btn btn-danger btn-lg" id="btnLimpar">Limpar Carrinho</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function carregarCarrinho() {
            const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            const carrinhoLista = document.getElementById("carrinhoLista");

            if (carrinho.length === 0) {
                carrinhoLista.innerHTML = '<p class="text-muted">Seu carrinho está vazio.</p>';
                return;
            }

            let html = '<div class="list-group">';
            carrinho.forEach((produto, index) => {
                html += `
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">${produto.nome || 'Produto'}</h6>
                                <p class="mb-0 text-muted">R$ ${(produto.preco || 0).toFixed(2)}</p>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-danger" onclick="removerProduto(${index})">
                                Remover
                            </button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            carrinhoLista.innerHTML = html;
        }

        function removerProduto(index) {
            const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            carrinho.splice(index, 1);
            localStorage.setItem("carrinho", JSON.stringify(carrinho));
            carregarCarrinho();
        }

        document.getElementById("btnLimpar").addEventListener("click", function() {
            if (confirm("Deseja limpar todo o carrinho?")) {
                localStorage.removeItem("carrinho");
                carregarCarrinho();
            }
        });

        document.getElementById("formPagamento").addEventListener("submit", function(e) {
            e.preventDefault();
            const metodo = document.querySelector('input[name="pagamento"]:checked').value;
            alert(`Compra finalizada com sucesso! Método de pagamento: ${metodo}`);
        });

        carregarCarrinho();
    </script>

</body>
</html>
