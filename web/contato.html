<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornari - Contato</title>
    <!-- aplica o tema antes do render para evitar flash branco -->
    <script>var t=localStorage.getItem("tema");if(t)document.documentElement.setAttribute("data-theme",t);</script>
    <link rel="stylesheet" href="../styles/main.scss">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="../index.html">Meu Projeto Web</a>
        <button class="navbar-toggler" id="navbar-toggler">☰</button>
        <ul class="navbar-nav" id="navbarNav">
            <li><a class="nav-link" href="../index.html">Home</a></li>
            <li><a class="nav-link" href="produtos.html">Produtos</a></li>
            <li><a class="nav-link active" href="contato.html">Contato</a></li>
            <li><a class="nav-link" href="depoimentos.html">Depoimentos</a></li>
        </ul>
        <button class="btn btn-outline-light" id="btn-tema">Mudar Tema</button>
    </nav>

    <main style="max-width: 500px;">
        <h1>Contato</h1>

        <div id="alert-form"></div>

        <form id="form-contato">
            <label for="nome">Nome</label>
            <input type="text" id="nome" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" required>

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" rows="5" required></textarea>

            <hr>

            <label for="cep">CEP</label>
            <input type="text" id="cep" maxlength="8" placeholder="Somente números">

            <label for="rua">Rua</label>
            <input type="text" id="rua" readonly>

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" readonly>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" readonly>

            <label for="estado">Estado</label>
            <input type="text" id="estado" readonly>

            <button type="submit" class="btn btn-success">Enviar</button>
        </form>
    </main>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
